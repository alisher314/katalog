                isImageFile(str) {
                    if (!str) return false;
                    return str.includes('.') || str.includes('/');
                },

                getTabName() {
                    switch(this.currentTab) {
                        case 'catalog': return 'Каталог';
                        case 'categories': return 'Категории';
                        case 'search': return 'Поиск';
                        case 'cart': return 'Корзина';
                        default: return 'korobka.uz';
                    }
                },

                getCategoryName(id) {
                    const cat = this.categories.find(c => c.id === id);
                    return cat ? cat.name : 'Все';
                },

                selectCategory(categoryId) {
                    this.activeCategory = categoryId;
                    this.currentTab = 'catalog';
                },

                openLightbox(product) {
                    this.selectedProduct = product;
                    this.isLightboxOpen = true;
                },

                filteredProducts() {
                    if (this.activeCategory === 'all') return this.products;
                    return this.products.filter(p => p.categoryId === this.activeCategory);
                },

                searchedProducts() {
                    if (!this.searchQuery) return [];
                    return this.products.filter(p => 
                        p.name.toLowerCase().includes(this.searchQuery.toLowerCase()) || 
                        p.sizeLabel.toLowerCase().includes(this.searchQuery.toLowerCase())
                    );
                },

                formatPrice(price) {
                    return price.toLocaleString('ru-RU') + ' сум';
                },

                addToCart(product) {
                    if (!product || product.inStock === false) return;
                    const existing = this.cart.find(item => item.product.id === product.id);
                    if (existing) {
                        existing.quantity++;
                    } else {
                        this.cart.push({ product, quantity: 1 });
                    }
                },

                updateQuantity(productId, amount) {
                    const item = this.cart.find(item => item.product.id === productId);
                    if (item) {
                        item.quantity += amount;
                        if (item.quantity <= 0) {
                            this.cart = this.cart.filter(i => i.product.id !== productId);
                        }
                    }
                },

                cartCount() {
                    return this.cart.reduce((sum, item) => sum + item.quantity, 0);
                },

                cartTotal() {
                    return this.cart.reduce((sum, item) => sum + (item.product.price * item.quantity), 0);
                },

                generateCartText() {
                    let text = "";
                    this.cart.forEach((item, index) => {
                        const totalItemPrice = item.product.price * item.quantity;
                        text += `${item.product.name} (${item.product.sizeLabel})\n`;
                        text += `${item.quantity} шт х ${this.formatPrice(item.product.price)} = ${this.formatPrice(totalItemPrice)}`;
                        
                        if (index < this.cart.length - 1) {
                            text += "\n\n";
                        }
                    });
                    
                    if (this.cart.length > 0) {
                        text += `\n\nОбщая сумма: ${this.formatPrice(this.cartTotal())}`;
                    }
                    return text;
                },

                copyToClipboard() {
                    const textToCopy = this.generateCartText();
                    navigator.clipboard.writeText(textToCopy).then(() => {
                        this.copyStatus = '✅ Скопировано';
                        setTimeout(() => {
                            this.copyStatus = '📋 Скопировать текст заказа';
                        }, 2000);
                    }).catch(err => {
                        console.error('Ошибка буфера:', err);
                        this.copyStatus = '❌ Ошибка';
                    });
                }

<body class="bg-[#FBFBFD] text-[#1A1A1A] antialiased font-sans pb-32" x-data="catalogApp()">

    <!-- Белый Header -->
    <header class="bg-white/80 backdrop-blur-xl sticky top-0 z-40 border-b border-gray-100">
        <div class="max-w-md mx-auto px-5 py-4 flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-xl font-black tracking-tight text-[#1A1A1A]">korobka.uz</span>
                <span class="text-[9px] text-[#D4AF37] uppercase tracking-widest font-semibold mt-0.5">КАТАЛОГ ТОВАРОВ</span>
            </div>
            <span class="text-[11px] bg-[#D4AF37] text-white font-bold px-3 py-1.5 rounded-full" x-text="getTabName()"></span>
        </div>
    </header>

    <!-- Плашка активного фильтра -->
    <div x-show="currentTab === 'catalog' && activeCategory !== 'all'" style="display: none;" class="bg-gray-50 border-b border-gray-100 py-2.5">
        <div class="max-w-md mx-auto px-5 flex justify-between items-center text-xs">
            <span class="font-medium text-gray-500">
                Категория: <span class="text-[#D4AF37] font-bold" x-text="getCategoryName(activeCategory)"></span>
            </span>
            <button @click="activeCategory = 'all'" class="text-gray-400 hover:text-[#1A1A1A] font-medium flex items-center gap-1 transition-colors">
                Сбросить ✕
            </button>
        </div>
    </div>

    <!-- ВКЛАДКА: КАТАЛОГ -->
    <div x-show="currentTab === 'catalog'">
        
        <!-- НОВОЕ: Горизонтальная карусель категорий на главной -->
        <section class="max-w-md mx-auto mt-4 px-4">
            <div class="flex gap-3 overflow-x-auto no-scrollbar py-2 scroll-smooth snap-x">
                
                <!-- Кнопка "Все" в начале карусели -->
                <div @click="activeCategory = 'all'" 
                     :class="activeCategory === 'all' ? 'border-[#D4AF37] bg-white shadow-[0_4px_12px_rgba(212,175,55,0.1)] scale-102' : 'border-gray-100 bg-white shadow-[0_4px_12px_rgba(0,0,0,0.01)]'"
                     class="flex items-center gap-2 px-4 py-2.5 rounded-xl border cursor-pointer transition-all snap-start shrink-0 select-none active:scale-95">
                    <span class="text-base">🛍️</span>
                    <span class="text-xs font-bold whitespace-nowrap" :class="activeCategory === 'all' ? 'text-[#D4AF37]' : 'text-[#1A1A1A]'">Все</span>
                </div>

                <!-- Элементы категорий -->
                <template x-for="cat in categories" :key="cat.id">
                    <div @click="selectCategory(cat.id)" 
                         :class="activeCategory === cat.id ? 'border-[#D4AF37] bg-white shadow-[0_4px_12px_rgba(212,175,55,0.1)] scale-102' : 'border-gray-100 bg-white shadow-[0_4px_12px_rgba(0,0,0,0.01)]'"
                         class="flex items-center gap-2 px-4 py-2.5 rounded-xl border cursor-pointer transition-all snap-start shrink-0 select-none active:scale-95">
                        <span class="text-base" x-text="cat.icon || '📦'"></span>
                        <span class="text-xs font-bold whitespace-nowrap" :class="activeCategory === cat.id ? 'text-[#D4AF37]' : 'text-[#1A1A1A]'" x-text="cat.name"></span>
                    </div>
                </template>
            </div>
        </section>

        <!-- Список товаров -->
        <main class="max-w-md mx-auto px-4 mt-4">
            <div class="grid grid-cols-2 gap-3">
                <template x-for="product in filteredProducts()" :key="product.id">
                    <div @click="product.inStock !== false && openLightbox(product)" 
                         :class="product.inStock === false ? 'opacity-40 cursor-not-allowed' : 'cursor-pointer hover:border-[#D4AF37]/40 hover:shadow-[0_12px_30px_rgba(212,175,55,0.06)]'"
                         class="bg-white rounded-2xl border border-gray-100 p-3 flex flex-col justify-between transition-all duration-300 shadow-[0_8px_24px_rgba(0,0,0,0.015)] select-none">
                        
                        <div class="w-full aspect-square bg-[#F8F9FA] rounded-xl mb-3 overflow-hidden flex items-center justify-center relative">
                            <template x-if="isImageFile(product.image)">
                                <img :src="product.image" :alt="product.name" class="w-full h-full object-cover transition-transform duration-500 hover:scale-103" loading="lazy" @error="$el.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'100\' viewBox=\'0 0 100 100\'><rect width=\'100\' height=\'100\' fill=\'%23F1F3F5\'/><text x=\'50\' y=\'55\' font-size=\'30\' text-anchor=\'middle\'>📦</text></svg>.'">
                            </template>
                            <template x-if="!isImageFile(product.image)">
                                <span class="text-3xl drop-shadow-xs" x-text="product.image || '📦'"></span>
                            </template>

                            <template x-if="product.inStock === false">
                                <div class="absolute inset-0 bg-white/60 backdrop-blur-xs flex items-center justify-center">
                                    <span class="bg-[#D4AF37] text-white text-[8px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-md shadow-xs">Ожидается</span>
                                </div>
                            </template>
                        </div>
                        
                        <div class="flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="font-bold text-[#1A1A1A] text-[13px] leading-tight tracking-tight mb-1" x-text="product.name"></h3>
                                <div class="inline-block bg-gray-100 text-gray-500 text-[9px] font-medium px-1.5 py-0.5 rounded-sm mb-2" x-text="product.sizeLabel"></div>
                            </div>
                            
                            <div class="flex items-center justify-between gap-1.5 mt-2">
                                <span class="text-[13px] font-black text-[#1A1A1A] whitespace-nowrap" x-text="formatPrice(product.price)"></span>
                                <template x-if="product.inStock !== false">
                                    <button @click.stop="addToCart(product)" class="w-7 h-7 bg-[#D4AF37] hover:bg-[#C5A028] text-white rounded-lg flex items-center justify-center transition-all active:scale-90 shrink-0">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                                    </button>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <!-- ВКЛАДКА: КАТЕГОРИИ (ПОЛНЫЙ СПИСОК) -->
    <div x-show="currentTab === 'categories'" style="display: none;" x-transition>
        <main class="max-w-md mx-auto px-4 mt-5">
            <div class="flex flex-col gap-2.5">
                <div @click="selectCategory('all')" class="bg-white border border-gray-100 p-4 rounded-2xl flex items-center justify-between cursor-pointer transition-all hover:border-[#D4AF37]/30 shadow-[0_8px_24px_rgba(0,0,0,0.015)] select-none active:scale-[0.99]">
                    <div class="flex items-center gap-4">
                        <span class="text-xl bg-gray-50 border border-gray-100 p-3 rounded-xl flex items-center justify-center w-12 h-12">🛍️</span>
                        <div>
                            <h3 class="font-bold text-[#1A1A1A] text-sm tracking-tight">Все товары каталога</h3>
                            <p class="text-[11px] text-gray-400 mt-0.5" x-text="'Общий ассортимент: ' + products.length"></p>
                        </div>
                    </div>
                    <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </div>

                <template x-for="cat in categories" :key="cat.id">
                    <div @click="selectCategory(cat.id)" class="bg-white border border-gray-100 p-4 rounded-2xl flex items-center justify-between cursor-pointer transition-all hover:border-[#D4AF37]/30 shadow-[0_8px_24px_rgba(0,0,0,0.015)] select-none active:scale-[0.99]">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-gray-50 border border-gray-100 rounded-xl flex items-center justify-center text-xl">
                                <span x-text="cat.icon || '📦'"></span>
                            </div>
                            <div>
                                <h3 class="font-bold text-[#1A1A1A] text-sm tracking-tight" x-text="cat.name"></h3>
                                <p class="text-[11px] text-gray-400 mt-0.5" x-text="'Позиций: ' + products.filter(p => p.categoryId === cat.id).length"></p>
                            </div>
                        </div>
                        <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <!-- ВКЛАДКА: ПОИСК -->
    <div x-show="currentTab === 'search'" style="display: none;" x-transition>
        <main class="max-w-md mx-auto px-4 mt-5">
            <div class="relative flex items-center mb-5">
                <input type="text" x-model="searchQuery" placeholder="Поиск по названию или размеру..." class="w-full bg-white border border-gray-200 rounded-xl py-3 pl-10 pr-10 text-sm focus:outline-none focus:border-[#D4AF37] shadow-[0_4px_12px_rgba(0,0,0,0.01)] placeholder-gray-400 transition-colors">
                <div class="absolute left-3.5 text-gray-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <button x-show="searchQuery" @click="searchQuery = ''" class="absolute right-3 text-gray-400 text-lg">&times;</button>
            </div>

            <div class="grid grid-cols-2 gap-3" x-show="searchQuery">
                <template x-for="product in searchedProducts()" :key="product.id">
                    <div @click="product.inStock !== false && openLightbox(product)" class="bg-white rounded-2xl border border-gray-100 p-3 flex flex-col justify-between shadow-[0_8px_24px_rgba(0,0,0,0.015)] select-none">
                        <div class="w-full aspect-square bg-[#F8F9FA] rounded-xl mb-3 overflow-hidden flex items-center justify-center">
                            <template x-if="isImageFile(product.image)">
                                <img :src="product.image" :alt="product.name" class="w-full h-full object-cover" loading="lazy" @error="$el.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'100\' viewBox=\'0 0 100 100\'><rect width=\'100\' height=\'100\' fill=\'%23F1F3F5\'/><text x=\'50\' y=\'55\' font-size=\'30\' text-anchor=\'middle\'>📦</text></svg>.'">
                            </template>
                            <template x-if="!isImageFile(product.image)">
                                <span class="text-3xl" x-text="product.image"></span>
                            </template>
                        </div>
                        <div class="flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="font-bold text-[#1A1A1A] text-[13px] leading-tight mb-1" x-text="product.name"></h3>
                                <div class="inline-block bg-gray-100 text-gray-500 text-[9px] px-1.5 py-0.5 rounded-sm mb-2" x-text="product.sizeLabel"></div>
                            </div>
                            <div class="flex items-center justify-between mt-2">
                                <span class="text-[13px] font-black text-[#1A1A1A]" x-text="formatPrice(product.price)"></span>
                                <button @click.stop="addToCart(product)" class="w-7 h-7 bg-[#D4AF37] text-white rounded-lg flex items-center justify-center">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <!-- ВКЛАДКА: КОРЗИНА -->
    <div x-show="currentTab === 'cart'" style="display: none;" x-transition>
        <main class="max-w-md mx-auto px-4 mt-5">
            <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-[0_12px_30px_rgba(0,0,0,0.03)]">
                <div class="p-5 space-y-4">
                    <template x-if="cart.length === 0">
                        <div class="text-center py-12">
                            <span class="text-4xl block mb-3">📥</span>
                            <p class="text-gray-400 text-xs font-medium">Ваша корзина пока пуста</p>
                            <button @click="currentTab = 'catalog'" class="mt-4 inline-block text-[11px] bg-[#D4AF37] hover:bg-[#C5A028] text-white px-4 py-2 rounded-xl font-bold tracking-tight transition-colors">Назад в каталог</button>
                        </div>
                    </template>
                    
                    <template x-for="item in cart" :key="item.product.id">
                        <div class="flex items-center justify-between border-b border-gray-50 pb-3.5 last:border-0 last:pb-0 select-none">
                            <div class="flex-1 pr-3">
                                <h4 class="font-bold text-xs text-[#1A1A1A] tracking-tight leading-tight" x-text="item.product.name"></h4>
                                <p class="text-xs text-[#D4AF37] font-bold mt-1" x-text="formatPrice(item.product.price)"></p>
                            </div>
                            <div class="flex items-center gap-2.5 bg-[#F1F3F5] p-1 rounded-lg">
                                <button @click="updateQuantity(item.product.id, -1)" class="w-6 h-6 rounded-md bg-white flex items-center justify-center text-[#1A1A1A] font-bold text-xs shadow-xs active:scale-95">-</button>
                                <span class="w-4 text-center text-xs font-bold text-[#1A1A1A]" x-text="item.quantity"></span>
                                <button @click="updateQuantity(item.product.id, 1)" class="w-6 h-6 rounded-md bg-white flex items-center justify-center text-[#1A1A1A] font-bold text-xs shadow-xs active:scale-95">+</button>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="border-t border-gray-100 p-5 bg-white" x-show="cart.length > 0">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] text-gray-400 uppercase tracking-wider font-bold">Итого к заказу:</span>
                        <span class="text-lg font-black text-[#D4AF37]" x-text="formatPrice(cartTotal())"></span>
                    </div>
                    <div class="mb-4">
                        <label class="block text-[9px] font-bold text-gray-400 uppercase tracking-wider mb-2">Формируемый чек для Telegram:</label>
                        <pre class="bg-gray-50 p-3 border border-gray-100 rounded-xl text-[11px] font-mono text-gray-500 whitespace-pre-wrap leading-relaxed max-h-36 overflow-y-auto" x-text="generateCartText()"></pre>
                    </div>
                    <button @click="copyToClipboard()" class="w-full bg-[#D4AF37] hover:bg-[#C5A028] text-white font-bold py-3.5 rounded-xl transition-all active:scale-[0.99] flex items-center justify-center gap-2 text-xs shadow-xs">
                        <span x-text="copyStatus"></span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Модалка (Lightbox) -->
    <div x-show="isLightboxOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4" style="display: none;" x-transition>
        <div class="absolute inset-0 bg-black/20 backdrop-blur-sm" @click="isLightboxOpen = false"></div>
        <div class="bg-white rounded-2xl max-w-sm w-full overflow-hidden shadow-xl border border-gray-100 relative z-10 transition-all">
            <button @click="isLightboxOpen = false" class="absolute top-3 right-3 w-7 h-7 rounded-full bg-gray-100 text-[#1A1A1A] flex items-center justify-center text-sm font-bold z-20">&times;</button>
            <div class="w-full aspect-square bg-[#F8F9FA] flex items-center justify-center border-b border-gray-100 overflow-hidden">
                <template x-if="isImageFile(selectedProduct?.image)">
                    <img :src="selectedProduct.image" :alt="selectedProduct.name" class="w-full h-full object-cover">
                </template>
                <template x-if="!isImageFile(selectedProduct?.image)">
                    <span class="text-7xl select-none drop-shadow-xs" x-text="selectedProduct?.image"></span>
                </template>
            </div>
            <div class="p-5 bg-white">
                <h3 class="text-base font-black text-[#1A1A1A] tracking-tight mb-1" x-text="selectedProduct?.name"></h3>
                <span class="inline-block bg-gray-100 text-gray-500 text-[10px] font-medium px-2 py-0.5 rounded-sm mb-3" x-text="'Размер: ' + selectedProduct?.sizeLabel"></span>
                <p class="text-xs text-gray-400 mb-4 leading-relaxed" x-text="selectedProduct?.description || 'Премиум упаковка от производителя.'"></p>
                <div class="flex items-center justify-between pt-3 border-t border-gray-100">
                    <span class="text-base font-black text-[#D4AF37]" x-text="formatPrice(selectedProduct?.price || 0)"></span>
                    <button @click="addToCart(selectedProduct); isLightboxOpen = false" class="bg-[#D4AF37] hover:bg-[#C5A028] text-white font-bold px-4 py-2 rounded-xl text-xs transition-colors">
                        🛒 В корзину
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Навигация -->
    <div class="fixed bottom-0 inset-x-0 bg-white/80 backdrop-blur-xl border-t border-gray-100 z-40 shadow-[0_-4px_20px_rgba(0,0,0,0.015)]">
        <div class="max-w-md mx-auto px-4 py-2 flex justify-between items-center text-center gap-1">
            <button @click="currentTab = 'catalog'" :class="currentTab === 'catalog' ? 'text-[#D4AF37] font-bold' : 'text-gray-400'" class="flex flex-col items-center justify-center gap-1 transition-all flex-1 py-1.5 select-none active:scale-95">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                <span class="text-[9px] uppercase tracking-wider font-semibold">Каталог</span>
            </button>
            <button @click="currentTab = 'categories'" :class="currentTab === 'categories' ? 'text-[#D4AF37] font-bold' : 'text-gray-400'" class="flex flex-col items-center justify-center gap-1 transition-all flex-1 py-1.5 select-none active:scale-95">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <span class="text-[9px] uppercase tracking-wider font-semibold">Разделы</span>
            </button>
            <button @click="currentTab = 'search'" :class="currentTab === 'search' ? 'text-[#D4AF37] font-bold' : 'text-gray-400'" class="flex flex-col items-center justify-center gap-1 transition-all flex-1 py-1.5 select-none active:scale-95">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <span class="text-[9px] uppercase tracking-wider font-semibold">Поиск</span>
            </button>
            <button @click="currentTab = 'cart'" :class="currentTab === 'cart' ? 'text-[#D4AF37] font-bold' : 'text-gray-400'" class="relative flex flex-col items-center justify-center gap-1 py-1.5 transition-all flex-1 select-none active:scale-95">
                <div class="relative">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <span x-show="cartCount() > 0" x-text="cartCount()" class="absolute -top-1.5 -right-2 text-[8px] bg-[#D4AF37] text-white w-3.5 h-3.5 rounded-full flex items-center justify-center font-bold"></span>
                </div>
                <span class="text-[9px] uppercase tracking-wider font-semibold" x-text="cartCount() > 0 && currentTab !== 'cart' ? formatPrice(cartTotal()) : 'Корзина'"></span>
            </button>
        </div>
    </div>
</body>
</html>
