<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>korobka.uz</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-white text-[#4A5056] antialiased font-sans pb-28" x-data="catalogApp()">

    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b border-[#C2A473]/20">
        <div class="max-w-lg mx-auto px-4 py-4 flex justify-between items-center">
            <span class="text-xl font-black tracking-tight text-[#A88B5B]">
                 korobka.uz
            </span>
            <span class="text-xs bg-[#C2A473]/10 text-[#A88B5B] font-bold px-2.5 py-1 rounded-lg border border-[#C2A473]/30" 
                  x-text="getTabName()">
            </span>
        </div>
    </header>

    <div x-show="currentTab === 'catalog' && activeCategory !== 'all'" class="bg-[#C2A473]/5 border-b border-[#C2A473]/20 py-2">
        <div class="max-w-lg mx-auto px-4 flex justify-between items-center text-xs">
            <span class="text-[#4A5056] font-medium">
                Выбрано: <span class="text-[#A88B5B] font-bold" x-text="getCategoryName(activeCategory)"></span>
            </span>
            <button @click="activeCategory = 'all'" class="text-[#A88B5B] hover:text-[#A88B5B] font-bold underline">
                Показать все товары
            </button>
        </div>
    </div>

    <div x-show="currentTab === 'catalog'">
        <main class="max-w-lg mx-auto px-4 mt-4">
            <div class="grid grid-cols-2 gap-3">
                <template x-for="product in filteredProducts()" :key="product.id">
                    <div @click="product.inStock !== false && openLightbox(product)" 
                         :class="product.inStock === false ? 'opacity-60 cursor-not-allowed' : 'cursor-pointer hover:shadow-md'"
                         class="bg-white rounded-2xl border border-gray-200 p-3 flex flex-col justify-between transition-all duration-200">
                        
                        <div class="w-full aspect-square bg-gray-50 rounded-xl mb-3 overflow-hidden flex items-center justify-center relative border border-gray-100">
                            
                            <template x-if="isImageFile(product.image)">
                                <img :src="product.image" :alt="product.name" class="w-full h-full object-cover">
                            </template>
                            
                            <template x-if="!isImageFile(product.image)">
                                <span class="text-4xl" x-text="product.image || '📦'"></span>
                            </template>

                            <template x-if="product.inStock === false">
                                <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
                                    <span class="bg-red-500 text-white text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-md shadow-xs">
                                        Нет в наличии
                                    </span>
                                </div>
                            </template>
                        </div>
                        
                        <div class="flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="font-bold text-[#4A5056] text-[15px] leading-tight mb-1" x-text="product.name"></h3>
                                <p class="text-[11px] text-gray-400 line-clamp-2 mb-3" x-text="product.description"></p>
                            </div>
                            
                            <div class="flex items-center justify-between gap-2">
                                <span class="inline-block bg-[#C2A473]/10 text-[#A88B5B] text-xs font-black px-3 py-1.5 rounded-xl border border-[#C2A473]/30" x-text="formatPrice(product.price)"></span>
                                
                                <template x-if="product.inStock !== false">
                                    <button @click.stop="addToCart(product)" class="w-8 h-8 bg-[#C2A473]/10 hover:bg-[#C2A473]/20 active:scale-90 text-[#A88B5B] rounded-lg flex items-center justify-center transition-all border border-[#C2A473]/20 shrink-0">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                                    </button>
                                </template>

                                <template x-if="product.inStock === false">
                                    <button disabled class="w-8 h-8 bg-gray-100 text-gray-400 rounded-lg flex items-center justify-center border border-gray-200 shrink-0 cursor-not-allowed">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                                    </button>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <div x-show="currentTab === 'categories'" style="display: none;" x-transition>
        <main class="max-w-lg mx-auto px-4 mt-4">
            <div class="flex flex-col gap-3">
                <div @click="selectCategory('all')" class="bg-white border border-gray-200 p-4 rounded-2xl flex items-center justify-between cursor-pointer active:scale-[0.99] transition-all hover:border-[#C2A473]">
                    <div class="flex items-center gap-4">
                        <span class="text-3xl bg-[#C2A473]/10 p-2.5 rounded-xl flex items-center justify-center w-14 h-14">🛍️</span>
                        <div>
                            <h3 class="font-bold text-[#4A5056] text-md">Все товары</h3>
                            <p class="text-xs text-gray-400 mt-0.5" x-text="'Всего позиций: ' + products.length"></p>
                        </div>
                    </div>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </div>

                <template x-for="cat in categories" :key="cat.id">
                    <div @click="selectCategory(cat.id)" class="bg-white border border-gray-200 p-4 rounded-2xl flex items-center justify-between cursor-pointer active:scale-[0.99] transition-all hover:border-[#C2A473]">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-[#C2A473]/10 rounded-xl overflow-hidden flex items-center justify-center text-3xl">
                                <template x-if="isImageFile(cat.icon)">
                                    <img :src="cat.icon" :alt="cat.name" class="w-full h-full object-cover">
                                </template>
                                <template x-if="!isImageFile(cat.icon)">
                                    <span x-text="cat.icon || '📦'"></span>
                                </template>
                            </div>
                            <div>
                                <h3 class="font-bold text-[#4A5056] text-md" x-text="cat.name"></h3>
                                <p class="text-xs text-gray-400 mt-0.5" x-text="'Товаров: ' + products.filter(p => p.categoryId === cat.id).length"></p>
                            </div>
                        </div>
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <div x-show="currentTab === 'search'" style="display: none;" x-transition>
        <main class="max-w-lg mx-auto px-4 mt-4">
            <div class="relative flex items-center mb-6">
                <input type="text" 
                       x-model="searchQuery" 
                       placeholder="Введите название или описание..." 
                       class="w-full bg-white border border-gray-300 rounded-xl py-3 pl-11 pr-10 text-sm focus:outline-none focus:border-[#C2A473] shadow-xs placeholder-gray-400 transition-colors">
                <div class="absolute left-4 text-[#A88B5B]">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <button x-show="searchQuery" @click="searchQuery = ''" class="absolute right-3 text-gray-400 hover:text-gray-600 text-lg">&times;</button>
            </div>

            <div class="grid grid-cols-2 gap-3" x-show="searchQuery">
                <template x-for="product in searchedProducts()" :key="product.id">
                    <div @click="product.inStock !== false && openLightbox(product)" 
                         :class="product.inStock === false ? 'opacity-60 cursor-not-allowed' : 'cursor-pointer'"
                         class="bg-white rounded-2xl border border-gray-200 p-3 flex flex-col justify-between">
                        <div class="w-full aspect-square bg-gray-50 rounded-xl mb-3 overflow-hidden flex items-center justify-center relative border border-gray-100">
                            <template x-if="isImageFile(product.image)">
                                <img :src="product.image" :alt="product.name" class="w-full h-full object-cover">
                            </template>
                            <template x-if="!isImageFile(product.image)">
                                <span class="text-4xl" x-text="product.image"></span>
                            </template>
                            
                            <template x-if="product.inStock === false">
                                <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
                                    <span class="bg-red-500 text-white text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-md shadow-xs">
                                        Нет в наличии
                                    </span>
                                </div>
                            </template>
                        </div>
                        <div class="flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="font-bold text-[#4A5056] text-[15px] leading-tight mb-1" x-text="product.name"></h3>
                                <p class="text-[11px] text-gray-400 line-clamp-2 mb-2" x-text="product.description"></p>
                            </div>
                            
                            <div class="flex items-center justify-between gap-2">
                                <span class="inline-block bg-[#C2A473]/10 text-[#A88B5B] text-xs font-black px-3 py-1.5 rounded-xl border border-[#C2A473]/30" x-text="formatPrice(product.price)"></span>
                                
                                <template x-if="product.inStock !== false">
                                    <button @click.stop="addToCart(product)" class="w-8 h-8 bg-[#C2A473]/10 hover:bg-[#C2A473]/20 text-[#A88B5B] rounded-lg flex items-center justify-center border border-[#C2A473]/20 shrink-0">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                                    </button>
                                </template>

                                <template x-if="product.inStock === false">
                                    <button disabled class="w-8 h-8 bg-gray-100 text-gray-400 rounded-lg flex items-center justify-center border border-gray-200 shrink-0 cursor-not-allowed">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                                    </button>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <div x-show="currentTab === 'cart'" style="display: none;" x-transition>
        <main class="max-w-lg mx-auto px-4 mt-4">
            <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-xs">
                <div class="p-4 space-y-3">
                    <template x-if="cart.length === 0">
                        <div class="text-center py-12">
                            <span class="text-4xl block mb-2">📥</span>
                            <p class="text-gray-400 text-sm">Ваша корзина пуста</p>
                            <button @click="currentTab = 'catalog'" class="mt-4 inline-block text-sm bg-[#C2A473] hover:bg-[#A88B5B] text-white px-4 py-2 rounded-xl font-bold transition-colors">Перейти в каталог</button>
                        </div>
                    </template>
                    <template x-for="item in cart" :key="item.product.id">
                        <div class="flex items-center justify-between border-b border-gray-100 pb-3 last:border-0 last:pb-0">
                            <div class="flex-1 pr-3">
                                <h4 class="font-bold text-sm text-[#4A5056]" x-text="item.product.name"></h4>
                                <p class="text-xs text-gray-400 mt-0.5" x-text="formatPrice(item.product.price)"></p>
                            </div>
                            <div class="flex items-center gap-2.5 bg-gray-50 p-1 rounded-lg border border-gray-100">
                                <button @click="updateQuantity(item.product.id, -1)" class="w-6 h-6 rounded-md bg-white flex items-center justify-center text-[#A88B5B] font-bold text-xs shadow-xs">-</button>
                                <span class="w-5 text-center text-xs font-bold text-[#4A5056]" x-text="item.quantity"></span>
                                <button @click="updateQuantity(item.product.id, 1)" class="w-6 h-6 rounded-md bg-white flex items-center justify-center text-[#A88B5B] font-bold text-xs shadow-xs">+</button>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="border-t border-gray-100 p-4 bg-gray-50/50" x-show="cart.length > 0">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-sm text-gray-400 font-medium">Общая стоимость:</span>
                        <span class="text-lg font-black text-[#A88B5B]" x-text="formatPrice(cartTotal())"></span>
                    </div>
                    <div class="mb-4">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Текст для копирования:</label>
                        <pre class="bg-gray-50 p-3 border border-gray-200 rounded-xl text-xs font-mono text-gray-600 whitespace-pre-wrap leading-relaxed max-h-40 overflow-y-auto" x-text="generateCartText()"></pre>
                    </div>
                    <button @click="copyToClipboard()" class="w-full bg-[#C2A473] hover:bg-[#A88B5B] text-white font-bold py-3.5 rounded-xl transition-all active:scale-[0.98] flex items-center justify-center gap-2 text-sm shadow-md">
                        <span x-text="copyStatus"></span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div x-show="isLightboxOpen" class="fixed inset-0 z-50 overflow-hidden flex items-center justify-center p-4" style="display: none;" x-transition>
        <div class="absolute inset-0 bg-black/60 backdrop-blur-xs" @click="isLightboxOpen = false"></div>
        <div class="bg-white rounded-2xl max-w-sm w-full overflow-hidden shadow-2xl border border-gray-100 relative z-10">
            <button @click="isLightboxOpen = false" class="absolute top-3 right-3 w-8 h-8 rounded-full bg-black/40 text-white flex items-center justify-center text-xl hover:bg-black/60 z-20">&times;</button>
            <div class="w-full aspect-square bg-gray-50 flex items-center justify-center border-b border-gray-100 overflow-hidden">
                <template x-if="isImageFile(selectedProduct?.image)">
                    <img :src="selectedProduct.image" :alt="selectedProduct.name" class="w-full h-full object-cover">
                </template>
                <template x-if="!isImageFile(selectedProduct?.image)">
                    <span class="text-8xl select-none" x-text="selectedProduct?.image"></span>
                </template>
            </div>
            <div class="p-5 bg-white">
                <h3 class="text-lg font-black text-[#4A5056] mb-1" x-text="selectedProduct?.name"></h3>
                <p class="text-sm text-gray-400 mb-4" x-text="selectedProduct?.description"></p>
                <div class="flex items-center justify-between mt-2">
                    <span class="text-md font-black text-[#A88B5B] bg-[#C2A473]/10 px-3 py-1.5 rounded-xl border border-[#C2A473]/20" x-text="formatPrice(selectedProduct?.price || 0)"></span>
                    <button @click="addToCart(selectedProduct); isLightboxOpen = false" class="bg-[#C2A473] hover:bg-[#A88B5B] text-white font-bold px-4 py-2 rounded-xl text-sm shadow-md flex items-center gap-1.5 transition-colors">
                        <span>🛒 В корзину</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 inset-x-0 bg-white/95 backdrop-blur-lg border-t border-gray-200 z-40 shadow-lg">
        <div class="max-w-lg mx-auto px-2 py-2 flex justify-between items-center text-center gap-1">
            <button @click="currentTab = 'catalog'" :class="currentTab === 'catalog' ? 'bg-[#C2A473] text-white shadow-xs' : 'bg-transparent text-gray-400 hover:text-[#4A5056]'" class="flex flex-col items-center justify-center gap-0.5 transition-all flex-1 py-1.5 rounded-xl">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                <span class="text-[10px] font-bold">Каталог</span>
            </button>
            <button @click="currentTab = 'categories'" :class="currentTab === 'categories' ? 'bg-[#C2A473] text-white shadow-xs' : 'bg-transparent text-gray-400 hover:text-[#4A5056]'" class="flex flex-col items-center justify-center gap-0.5 transition-all flex-1 py-1.5 rounded-xl">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <span class="text-[10px] font-bold">Категории</span>
            </button>
            <button @click="currentTab = 'search'" :class="currentTab === 'search' ? 'bg-[#C2A473] text-white shadow-xs' : 'bg-transparent text-gray-400 hover:text-[#4A5056]'" class="flex flex-col items-center justify-center gap-0.5 transition-all flex-1 py-1.5 rounded-xl">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <span class="text-[10px] font-bold">Поиск</span>
            </button>
            <button @click="currentTab = 'cart'" :class="currentTab === 'cart' ? 'bg-[#C2A473] text-white shadow-xs' : 'bg-transparent text-[#4A5056] hover:text-[#A88B5B]'" class="relative flex flex-col items-center justify-center gap-0.5 py-1.5 rounded-xl transition-all flex-1">
                <div class="relative">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <span x-show="cartCount() > 0" x-text="cartCount()" :class="currentTab === 'cart' ? 'bg-white text-[#A88B5B]' : 'bg-[#A88B5B] text-white'" class="absolute -top-1.5 -right-2 text-[9px] w-4 h-4 rounded-md flex items-center justify-center font-black"></span>
                </div>
                <span class="text-[10px] font-bold" x-text="cartCount() > 0 && currentTab !== 'cart' ? formatPrice(cartTotal()) : 'Корзина'"></span>
            </button>
        </div>
    </div>

    <script>
        function catalogApp() {
            return {
                currentTab: 'catalog',
                activeCategory: 'all',
                isLightboxOpen: false,
                selectedProduct: null,
                searchQuery: '',
                copyStatus: '📋 Скопировать текст заказа',
                
                categories: [
                    { id: 'boxes', name: 'Коробки', icon: '📦' }, 
                    { id: 'plates', name: 'Подложки', icon: '💿' }, 
                    { id: 'ribbons', name: 'Ленты и декор', icon: '🎗️' } 
                ],
                
                products: [
                    // В качестве примера второму товару выставлен статус inStock: false
                    { id: 1, categoryId: 'plates', name: 'Подложка круглая 20см', description: 'Толщина 3мм, белого цвета, влагостойкая', price: 5000, image: 'images/20.jpg', inStock: true }, 
                    { id: 2, categoryId: 'plates', name: 'Подложка круглая 23см', description: 'Толщина 3мм, белого цвета, влагостойкая', price: 7000, image: 'images/23.jpg', inStock: false },
                    { id: 3, categoryId: 'plates', name: 'Подложка круглая 25см', description: 'Толщина 3мм, белого цвета, влагостойкая', price: 10000, image: 'images/25.jpg', inStock: true },
					{ id: 4, categoryId: 'plates', name: 'Подложка круглая 26см', description: 'Толщина 3мм, белого цвета, влагостойкая', price: 10000, image: 'images/26.jpg', inStock: true },
					{ id: 5, categoryId: 'plates', name: 'Подложка круглая 30см', description: 'Толщина 3мм, белого цвета, влагостойкая', price: 12000, image: 'images/30.jpg', inStock: true },
					{ id: 6, categoryId: 'boxes', name: 'Коробка для торта 22х22', description: 'Самосборная, с прозрачным окном', price: 8000, image: '📦', inStock: true }, 
                    { id: 7, categoryId: 'boxes', name: 'Коробка под капкейки х6', description: 'Крафтовый плотный картон с ложементом', price: 6500, image: '🧁', inStock: true },
                    { id: 8, categoryId: 'ribbons', name: 'Лента атласная 2см', description: 'Премиум качество, рулон 30 метров', price: 15000, image: '🎗️', inStock: true } 
                ],
                cart: [],

                isImageFile(str) {
                    if (!str) return false;
                    return str.includes('.') || str.startsWith('http://') || str.startsWith('https://');
                },

                getTabName() {
                    switch(this.currentTab) {
                        case 'catalog': return 'Каталог';
                        case 'categories': return 'Категории';
                        case 'search': return 'Поиск';
                        case 'cart': return 'Корзина';
                        default: return 'korobka.uz';
                    }
                },

                getCategoryName(id) {
                    const cat = this.categories.find(c => c.id === id);
                    return cat ? cat.name : 'Все';
                },

                selectCategory(categoryId) {
                    this.activeCategory = categoryId;
                    this.currentTab = 'catalog';
                },

                openLightbox(product) {
                    this.selectedProduct = product;
                    this.isLightboxOpen = true;
                },

                filteredProducts() {
                    if (this.activeCategory === 'all') return this.products;
                    return this.products.filter(p => p.categoryId === this.activeCategory);
                },

                searchedProducts() {
                    if (!this.searchQuery) return [];
                    return this.products.filter(p => 
                        p.name.toLowerCase().includes(this.searchQuery.toLowerCase()) || 
                        p.description.toLowerCase().includes(this.searchQuery.toLowerCase())
                    );
                },

                formatPrice(price) {
                    return price.toLocaleString('ru-RU') + ' сум';
                },

                addToCart(product) {
                    if (!product || product.inStock === false) return;
                    const existing = this.cart.find(item => item.product.id === product.id);
                    if (existing) {
                        existing.quantity++;
                    } else {
                        this.cart.push({ product, quantity: 1 });
                    }
                },

                updateQuantity(productId, amount) {
                    const item = this.cart.find(item => item.product.id === productId);
                    if (item) {
                        item.quantity += amount;
                        if (item.quantity <= 0) {
                            this.cart = this.cart.filter(i => i.product.id !== productId);
                        }
                    }
                },

                cartCount() {
                    return this.cart.reduce((sum, item) => sum + item.quantity, 0);
                },

                cartTotal() {
                    return this.cart.reduce((sum, item) => sum + (item.product.price * item.quantity), 0);
                },

                generateCartText() {
                    let text = "";
                    this.cart.forEach((item, index) => {
                        const totalItemPrice = item.product.price * item.quantity;
                        text += `${item.product.name}\n`;
                        text += `${item.quantity} шт х ${this.formatPrice(item.product.price)} = ${this.formatPrice(totalItemPrice)}`;
                        
                        if (index < this.cart.length - 1) {
                            text += "\n\n";
                        }
                    });
                    
                    if (this.cart.length > 0) {
                        text += `\n\nОбщая сумма: ${this.formatPrice(this.cartTotal())}`;
                    }
                    return text;
                },

                copyToClipboard() {
                    const textToCopy = this.generateCartText();
                    navigator.clipboard.writeText(textToCopy).then(() => {
                        this.copyStatus = '✅ Скопировано!';
                        setTimeout(() => {
                            this.copyStatus = '📋 Скопировать текст заказа';
                        }, 2000);
                    }).catch(err => {
                        console.error('Ошибка буфера:', err);
                        this.copyStatus = '❌ Ошибка';
                    });
                }
            }
        }
    </script>
</body>
</html>
